# BlueForecast Model Pipeline — Docker Compose
# Services: postgres (Airflow DB) | airflow-webserver | airflow-scheduler | mlflow
#
# Port assignments (avoids clash with Data-Pipeline at 8081):
#   Airflow UI : localhost:8082
#   MLflow UI  : localhost:5000
#
# Start: docker compose up
# Airflow UI: http://localhost:8082  (user: airflow / pass: airflow)
# MLflow UI:  http://localhost:5000

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3
  environment:
  # Add these two lines inside the environment: block of x-airflow-common
    AIRFLOW__LOG_RETENTION_DAYS: "7"
    AIRFLOW__LOGGING__LOGGING_LEVEL: "WARNING"
    AIRFLOW__CORE__EXECUTOR:                   LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN:       postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY:                 ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES:              "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG:         "true"
    # MLflow tracking URI points to the mlflow service
    MLFLOW_TRACKING_URI:                       http://mlflow:5000
    # Slack failure alerts — set webhook URL to enable (leave commented to disable)
    # SLACK_WEBHOOK_URL: ""
    # GCP
    GOOGLE_APPLICATION_CREDENTIALS:           /home/airflow/.config/gcloud/application_default_credentials.json
    GOOGLE_CLOUD_PROJECT:                      bluebikes-demand-predictor
    # Python dependencies installed at container startup
    _PIP_ADDITIONAL_REQUIREMENTS: >-
      xgboost>=2.0.0
      mlflow>=2.10.0
      shap>=0.44.0
      scikit-learn>=1.3.0
      holidays>=0.46
      google-cloud-storage>=2.10.0
      pandas>=2.0.0
      numpy>=1.24.0
      pyarrow>=12.0.0
      optuna>=3.0.0
      matplotlib>=3.7.0
      scipy>=1.11.0
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - ./logs:/opt/airflow/logs
    - ~/.config/gcloud:/home/airflow/.config/gcloud:ro
  depends_on:
    postgres:
      condition: service_healthy

services:
  # ── Airflow metadata database ─────────────────────────────────────────────
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER:     airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB:       airflow
    volumes:
      - postgres-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5

  # ── Airflow webserver ─────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8082:8080"    # 8082 avoids clash with data pipeline at 8081
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 300s

  # ── Airflow scheduler ─────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler

  # ── Airflow DB init (runs once, then exits) ───────────────────────────────
  airflow-init:
    <<: *airflow-common
    command: bash -c "airflow db migrate && airflow users create --username airflow --password airflow --firstname Airflow --lastname Admin --role Admin --email airflow@example.com || true"
    restart: "no"

  # ── MLflow tracking server ────────────────────────────────────────────────
  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --backend-store-uri sqlite:////mlflow/mlruns.db
      --default-artifact-root gs://bluebikes-demand-predictor-data/mlflow-artifacts/
      --host 0.0.0.0
      --port 5000
      --allowed-hosts "*"
    volumes:
      - mlflow-data:/mlflow
      - ~/.config/gcloud:/root/.config/gcloud:ro
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /root/.config/gcloud/application_default_credentials.json
      GOOGLE_CLOUD_PROJECT:           bluebikes-demand-predictor
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  postgres-db:
  mlflow-data:
