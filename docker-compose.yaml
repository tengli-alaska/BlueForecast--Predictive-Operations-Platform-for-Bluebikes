services:

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U airflow" ]
      interval: 5s
      retries: 10
    volumes:
      - postgres-db:/var/lib/postgresql/data

  spark:
    image: apache/spark:3.5.0
    container_name: spark
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/opt/creds/application_default_credentials.json
    volumes:
      - ./:/opt/spark/work-dir
      - C:/Users/Uma/AppData/Roaming/gcloud/application_default_credentials.json:/opt/creds/application_default_credentials.json:ro
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8082:8080"
      - "7077:7077"

  spark-worker:
    image: apache/spark:3.5.0
    depends_on:
      - spark
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/opt/creds/application_default_credentials.json
    volumes:
      - ./:/opt/spark/work-dir
      - C:/Users/Uma/AppData/Roaming/gcloud/application_default_credentials.json:/opt/creds/application_default_credentials.json:ro
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark:7077

  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    depends_on:
      - postgres
      - spark
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      GOOGLE_APPLICATION_CREDENTIALS: /home/airflow/.config/gcloud/application_default_credentials.json
      GOOGLE_CLOUD_PROJECT: bluebikes-demand-predictor
      PYTHONPATH: /opt/airflow
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./jobs:/opt/airflow/jobs
      - ./config:/opt/airflow/config
      - ./logs:/opt/airflow/logs
      - C:/Users/Uma/AppData/Roaming/gcloud/application_default_credentials.json:/home/airflow/.config/gcloud/application_default_credentials.json:ro
    ports:
      - "8081:8080"
    command: >
      bash -c "airflow db migrate && airflow users create --username admin --password admin --firstname admin --lastname admin --role Admin --email admin@example.com || true && exec airflow webserver"

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    depends_on:
      - airflow-webserver
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      GOOGLE_APPLICATION_CREDENTIALS: /home/airflow/.config/gcloud/application_default_credentials.json
      GOOGLE_CLOUD_PROJECT: bluebikes-demand-predictor
      PYTHONPATH: /opt/airflow
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./jobs:/opt/airflow/jobs
      - ./config:/opt/airflow/config
      - ./logs:/opt/airflow/logs
      - C:/Users/Uma/AppData/Roaming/gcloud/application_default_credentials.json:/home/airflow/.config/gcloud/application_default_credentials.json:ro
    command: scheduler

volumes:
  postgres-db:
