name: Integration Tests

on:
  push:
    branches:
      - main
    paths:
      - 'dashboard/**'
      - 'deployment-pipeline/**'
      - 'Model-Pipeline/**'
  pull_request:
    paths:
      - 'dashboard/**'
      - 'deployment-pipeline/**'
      - 'Model-Pipeline/**'
  workflow_dispatch:

jobs:
  # -----------------------------------------------------------------
  # Job 1: Edge inference server unit + integration tests
  # -----------------------------------------------------------------
  edge-tests:
    name: Edge Inference Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deployment-pipeline/edge-deployment
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install edge dependencies
        run: pip install -r requirements.txt pytest httpx xgboost

      - name: Run edge unit tests (schema + cyclical features + request conversion)
        run: pytest tests/test_inference.py -v --tb=short -k "not TestONNXModel and not TestAPIEndpoints and not TestMetadata"

  # -----------------------------------------------------------------
  # Job 2: Dashboard API integration tests (against live Cloud Run)
  # -----------------------------------------------------------------
  api-integration:
    name: Dashboard API Integration Tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install httpx pytest

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_JSON }}

      - name: Fetch deployed API URL
        id: api-url
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          REGION: us-east1
          API_SERVICE: blueforecast-api
        run: |
          URL=$(gcloud run services describe $API_SERVICE \
            --region $REGION \
            --project $PROJECT_ID \
            --format 'value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "API URL: $URL"

      - name: Run API integration tests
        env:
          API_BASE_URL: ${{ steps.api-url.outputs.url }}
        run: |
          python - <<'EOF'
          import os
          import sys
          import httpx

          base = os.environ["API_BASE_URL"].rstrip("/")
          failures = []

          # Test 1: health endpoint
          r = httpx.get(f"{base}/health", timeout=15)
          if r.status_code != 200:
              failures.append(f"GET /health returned {r.status_code}")
          elif r.json().get("status") != "healthy":
              failures.append(f"GET /health body unexpected: {r.json()}")
          else:
              print("PASS  GET /health")

          # Test 2: stations endpoint returns list
          r = httpx.get(f"{base}/stations", timeout=15)
          if r.status_code != 200:
              failures.append(f"GET /stations returned {r.status_code}")
          elif not isinstance(r.json(), list) or len(r.json()) == 0:
              failures.append(f"GET /stations returned empty or non-list: {r.json()}")
          else:
              print(f"PASS  GET /stations ({len(r.json())} stations)")

          # Test 3: predictions endpoint returns data
          r = httpx.get(f"{base}/predictions", timeout=15)
          if r.status_code != 200:
              failures.append(f"GET /predictions returned {r.status_code}")
          else:
              print("PASS  GET /predictions")

          if failures:
              print("\nFAILURES:")
              for f in failures:
                  print(f"  - {f}")
              sys.exit(1)

          print("\nAll integration tests passed.")
          EOF

  # -----------------------------------------------------------------
  # Job 3: Deployment pipeline script smoke tests
  # -----------------------------------------------------------------
  script-smoke:
    name: Script Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify shell scripts are valid bash
        run: |
          echo "=== Checking deploy_dashboard.sh ==="
          bash -n deployment-pipeline/scripts/deploy_dashboard.sh
          echo "PASS  deploy_dashboard.sh syntax OK"
          echo "=== Checking refresh_serving.sh ==="
          bash -n deployment-pipeline/scripts/refresh_serving.sh
          echo "PASS  refresh_serving.sh syntax OK"
          echo "=== Checking verify_deployment.sh ==="
          bash -n deployment-pipeline/scripts/verify_deployment.sh
          echo "PASS  verify_deployment.sh syntax OK"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Verify monitoring scripts import cleanly
        run: |
          pip install google-cloud-storage pyyaml requests --quiet
          echo "=== Checking thresholds.yaml is valid YAML ==="
          python -c "import yaml; yaml.safe_load(open('deployment-pipeline/monitoring/thresholds.yaml'))"
          echo "PASS  thresholds.yaml"
          echo "=== Checking notify.py imports ==="
          python -c "import ast; ast.parse(open('deployment-pipeline/monitoring/notify.py').read())"
          echo "PASS  notify.py"
          echo "=== Checking performance_tracker.py imports ==="
          python -c "import ast; ast.parse(open('deployment-pipeline/monitoring/performance_tracker.py').read())"
          echo "PASS  performance_tracker.py"

  # -----------------------------------------------------------------
  # Job 4: Notify on failure
  # -----------------------------------------------------------------
  notify:
    name: Notify on Test Failure
    runs-on: ubuntu-latest
    needs: [edge-tests, api-integration, script-smoke]
    if: failure()
    steps:
      - name: Notify Slack
        if: env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":red_circle: *Integration Tests Failed*\n*Branch:* `${{ github.ref_name }}`\n*Commit:* `${{ github.sha }}`\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
