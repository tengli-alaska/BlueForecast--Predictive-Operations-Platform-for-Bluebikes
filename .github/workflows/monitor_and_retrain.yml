name: BlueForecast — Monitor & Auto-Retrain

# ── Triggers ──────────────────────────────────────────────────────────────────
on:
  schedule:
    # Run every 6 hours (matches Airflow monitoring DAG schedule)
    - cron: "0 */6 * * *"
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI
    inputs:
      force_retrain:
        description: "Force retraining even if no drift detected"
        required: false
        default: "false"
      reason:
        description: "Reason for manual trigger"
        required: false
        default: "manual"

# ── Environment ───────────────────────────────────────────────────────────────
env:
  PYTHON_VERSION: "3.11"
  GCS_BUCKET: "bluebikes-demand-predictor-data"

jobs:

  # ── Job 1: Run Monitoring Checks ──────────────────────────────────────────
  monitor:
    name: Run Drift & Performance Monitoring
    runs-on: ubuntu-latest

    outputs:
      drift_detected:  ${{ steps.check.outputs.drift_detected }}
      retrain_needed:  ${{ steps.check.outputs.retrain_needed }}
      drift_reason:    ${{ steps.check.outputs.drift_reason }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            evidently \
            gcsfs \
            google-cloud-storage \
            pandas \
            numpy \
            xgboost \
            scikit-learn \
            pyyaml \
            requests

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Run drift detection
        id: check
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          NOTIFY_EMAIL:      ${{ secrets.NOTIFY_EMAIL }}
          SMTP_HOST:         ${{ secrets.SMTP_HOST }}
          SMTP_USER:         ${{ secrets.SMTP_USER }}
          SMTP_PASS:         ${{ secrets.SMTP_PASS }}
        run: |
          python - <<'EOF'
          import json, sys, os
          sys.path.insert(0, "src")
          sys.path.insert(0, os.path.join(os.getcwd(), "src"))

          from monitoring.drift_detector import (
              load_reference, load_recent,
              detect_data_drift, detect_concept_drift, save_report
          )
          from monitoring.performance_tracker import compute_rolling_rmse
          from monitoring.alert_manager import check_and_alert
          from monitoring.notify import notify_drift_detected
          import gcsfs

          # Load data
          ref = load_reference()
          cur = load_recent(days=7)

          # Load production RMSE baseline
          fs = gcsfs.GCSFileSystem()
          try:
              with fs.open(f"gs://{os.environ['GCS_BUCKET']}/models/production/metadata.json") as f:
                  training_rmse = json.load(f)["metrics"]["val"]["rmse"]
          except Exception:
              training_rmse = 3.0

          # Run checks
          dd   = detect_data_drift(ref, cur)
          cd   = detect_concept_drift(cur, training_rmse)
          rep  = save_report(dd, cd)
          perf = compute_rolling_rmse(days=7)

          # Alert check
          result = check_and_alert(perf, rep)

          # Send Slack/email if drift detected
          if rep.get("any_drift"):
              notify_drift_detected(rep)

          # Set GitHub Actions outputs
          drift_detected = str(rep.get("any_drift", False)).lower()
          retrain_needed = str(result.get("should_retrain", False)).lower()
          reasons = [a["type"] for a in result.get("alerts", [])]
          reason_str = ", ".join(reasons) if reasons else "none"

          # Force retrain if manually triggered
          if os.environ.get("INPUT_FORCE_RETRAIN", "false").lower() == "true":
              retrain_needed = "true"
              reason_str = os.environ.get("INPUT_REASON", "manual")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"drift_detected={drift_detected}\n")
              f.write(f"retrain_needed={retrain_needed}\n")
              f.write(f"drift_reason={reason_str}\n")

          print(f"Drift detected: {drift_detected}")
          print(f"Retrain needed: {retrain_needed}")
          print(f"Reason: {reason_str}")
          EOF

      - name: Upload drift report
        uses: actions/upload-artifact@v4
        with:
          name: drift-report-${{ github.run_id }}
          path: /tmp/drift_report.json
          if-no-files-found: ignore

  # ── Job 2: Retrain (only if drift detected) ───────────────────────────────
  retrain:
    name: Retrain XGBoost Model
    runs-on: ubuntu-latest
    needs: monitor
    if: needs.monitor.outputs.retrain_needed == 'true'

    outputs:
      new_rmse: ${{ steps.train.outputs.new_rmse }}
      promoted: ${{ steps.promote.outputs.promoted }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            xgboost \
            scikit-learn \
            pandas \
            numpy \
            gcsfs \
            google-cloud-storage \
            pyyaml \
            requests

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Notify retraining started
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python - <<'EOF'
          import sys
          sys.path.insert(0, "src")
          sys.path.insert(0, os.path.join(os.getcwd(), "src"))
          from monitoring.notify import notify_retrain_triggered
          notify_retrain_triggered(
              reason="${{ needs.monitor.outputs.drift_reason }}",
              run_id="${{ github.run_id }}"
          )
          EOF

      - name: Pull latest feature matrix from GCS
        run: |
          python - <<'EOF'
          import gcsfs, os
          fs = gcsfs.GCSFileSystem()
          bucket = os.environ["GCS_BUCKET"]
          path   = f"gs://{bucket}/processed/features/feature_matrix.parquet"
          if not fs.exists(path):
              raise RuntimeError(f"Feature matrix not found at {path}")
          size_mb = fs.info(path)["size"] / 1e6
          print(f"Feature matrix found: {size_mb:.1f} MB")
          EOF

      - name: Retrain XGBoost model
        id: train
        run: |
          python - <<'EOF'
          import json, sys, os
          sys.path.insert(0, "src")
          sys.path.insert(0, os.path.join(os.getcwd(), "src"))

          from training.train import run

          print("Starting model training...")
          metrics = run()

          new_rmse = metrics["test"]["rmse"]
          print(f"Training complete. Test RMSE: {new_rmse:.4f}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"new_rmse={new_rmse:.4f}\n")
          EOF

      - name: Validate and promote model
        id: promote
        run: |
          python - <<'EOF'
          import json, sys, os
          import gcsfs
          sys.path.insert(0, "src")
          sys.path.insert(0, os.path.join(os.getcwd(), "src"))

          from monitoring.notify import notify_model_promoted, notify_retrain_skipped

          fs     = gcsfs.GCSFileSystem()
          bucket = os.environ["GCS_BUCKET"]

          new_rmse = float("${{ steps.train.outputs.new_rmse }}")

          # Get production RMSE
          try:
              with fs.open(f"gs://{bucket}/models/production/metadata.json") as f:
                  old_rmse = json.load(f)["metrics"]["test"]["rmse"]
          except FileNotFoundError:
              old_rmse = 9999.0  # No production model yet → always promote

          print(f"Production RMSE: {old_rmse:.4f}")
          print(f"New model RMSE:  {new_rmse:.4f}")

          promoted = new_rmse < old_rmse * 0.98  # Must be 2% better

          if promoted:
              print("New model is better — promoting to production")
              notify_model_promoted(new_rmse=new_rmse, old_rmse=old_rmse)
          else:
              print("New model did not improve — keeping existing production model")
              notify_retrain_skipped(new_rmse=new_rmse, old_rmse=old_rmse)

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"promoted={'true' if promoted else 'false'}\n")
          EOF

      - name: Upload training artifacts
        uses: actions/upload-artifact@v4
        with:
          name: training-artifacts-${{ github.run_id }}
          path: |
            models/
            *.json
          if-no-files-found: ignore

  # ── Job 3: Summary notification ───────────────────────────────────────────
  notify_summary:
    name: Send Summary Notification
    runs-on: ubuntu-latest
    needs: [monitor, retrain]
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install requests

      - name: Send pipeline summary to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python - <<'EOF'
          import requests, os, json
          from datetime import datetime

          webhook = os.environ.get("SLACK_WEBHOOK_URL", "")
          if not webhook:
              print("No Slack webhook configured")
              exit(0)

          drift    = "${{ needs.monitor.outputs.drift_detected }}"
          retrain  = "${{ needs.monitor.outputs.retrain_needed }}"
          reason   = "${{ needs.monitor.outputs.drift_reason }}"
          promoted = "${{ needs.retrain.outputs.promoted }}"
          new_rmse = "${{ needs.retrain.outputs.new_rmse }}"
          run_id   = "${{ github.run_id }}"

          if drift == "false":
              title   = "✅ Monitoring Complete — No Drift Detected"
              color   = "#34C759"
              message = "All systems normal. Model performance within acceptable thresholds."
          elif promoted == "true":
              title   = "🚀 Monitoring Complete — New Model Deployed"
              color   = "#0057FF"
              message = f"Drift detected and resolved. New model promoted with RMSE: {new_rmse}"
          elif retrain == "true":
              title   = "ℹ️ Monitoring Complete — Retrained, Not Promoted"
              color   = "#FF9F0A"
              message = f"Drift detected. Retrained but existing model is still better."
          else:
              title   = "⚠️ Monitoring Complete — Drift Detected"
              color   = "#FF3B30"
              message = f"Drift detected: {reason}. Check Airflow for retraining status."

          payload = {
              "attachments": [{
                  "color":   color,
                  "title":   f"🚲 BlueForecast | {title}",
                  "text":    message,
                  "fields":  [
                      {"title": "Drift Detected", "value": drift,    "short": True},
                      {"title": "Reason",         "value": reason,   "short": True},
                      {"title": "Retrained",      "value": retrain,  "short": True},
                      {"title": "Promoted",       "value": promoted if promoted else "N/A", "short": True},
                      {"title": "Run ID",         "value": run_id,   "short": True},
                      {"title": "Time",           "value": datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC"), "short": True},
                  ],
                  "footer": "BlueForecast CI/CD · GitHub Actions",
              }]
          }

          r = requests.post(webhook, json=payload, timeout=10)
          print(f"Slack summary sent: {r.status_code}")
          EOF
