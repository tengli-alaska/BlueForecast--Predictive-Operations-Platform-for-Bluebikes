name: BlueForecast — Monitor & Retrain

# Manual only — run when you have new training data and want to retrain.
# Auto-retrain disabled: current drift is calendar-driven (year/month features),
# not model degradation. MAE improved 30% — model is performing well.
on:
  workflow_dispatch:
    inputs:
      force_retrain:
        description: "Force retraining even if no drift detected"
        required: false
        default: "false"
      reason:
        description: "Reason for manual trigger"
        required: false
        default: "manual"

env:
  PYTHON_VERSION: "3.11"
  GCS_BUCKET: "bluebikes-demand-predictor-data"
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-east1
  API_SERVICE: blueforecast-api

jobs:
  # ---------------------------------------------------------------
  # Job 1: Check drift and print health report
  # ---------------------------------------------------------------
  monitor:
    name: Check Drift & Model Health
    runs-on: ubuntu-latest
    outputs:
      drift_detected: ${{ steps.drift.outputs.drift_detected }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install google-cloud-storage
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_JSON }}
      - name: Print drift report
        id: drift
        env:
          GCS_BUCKET: ${{ env.GCS_BUCKET }}
        run: |
          python - <<'EOF'
          import json, os
          from google.cloud import storage
          client = storage.Client()
          bucket = client.bucket(os.environ["GCS_BUCKET"])
          approved = json.loads(bucket.blob("processed/models/approved/metadata.json").download_as_text())
          run_id = approved["run_id"]
          drift = json.loads(bucket.blob(f"processed/models/{run_id}/drift_report.json").download_as_text())
          print("=== Drift Report ===")
          print(f"Overall drift detected: {drift['overall_drift_detected']}")
          print(f"Drifted features: {drift['feature_drift']['drifted_features']}")
          print(f"Performance MAE change: {drift['performance_drift']['mae_increase_pct']:.1f}%")
          print(f"Recommendation: {drift['recommendation']}")
          print(f"NOTE: month/year drift is calendar-driven, not model degradation.")
          # Set output for downstream job
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"drift_detected={str(drift['overall_drift_detected']).lower()}\n")
          EOF

  # ---------------------------------------------------------------
  # Job 2: Retrain, validate, and promote model
  # Runs if: force_retrain=true OR drift was detected
  # ---------------------------------------------------------------
  retrain:
    name: Retrain + Validate + Promote
    runs-on: ubuntu-latest
    needs: monitor
    if: >
      github.event.inputs.force_retrain == 'true' ||
      needs.monitor.outputs.drift_detected == 'true'
    env:
      PYTHONPATH: Model-Pipeline/src
      MLFLOW_TRACKING_URI: mlruns
      GCS_BUCKET: ${{ env.GCS_BUCKET }}
      GOOGLE_CLOUD_PROJECT: ${{ env.PROJECT_ID }}
      RETRAIN_REASON: ${{ github.event.inputs.reason }}
      FORCE_PROMOTE: ${{ github.event.inputs.force_retrain }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r Model-Pipeline/requirements.txt

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_JSON }}

      - name: Run retrain + promote pipeline
        run: |
          echo "=== Starting retraining pipeline ==="
          echo "Reason: ${{ github.event.inputs.reason }}"
          python3 deployment-pipeline/monitoring/retrain_and_promote.py

      - name: Refresh Cloud Run serving revision
        if: success()
        env:
          API_SERVICE: ${{ env.API_SERVICE }}
          REGION: ${{ env.REGION }}
          REFRESH_TOKEN: ${{ github.run_id }}-${{ github.run_attempt }}
        run: bash deployment-pipeline/scripts/refresh_serving.sh

      - name: Notify Slack on retrain failure
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":red_circle: *BlueForecast Retrain Failed*\n*Reason:* `${{ github.event.inputs.reason }}`\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
