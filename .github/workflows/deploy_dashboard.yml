name: Deploy Dashboard to Cloud Run

on:
  push:
    branches:
      - main
      - deployment-kickstart-sruthilaya  # temporary for testing
    paths:
      - 'dashboard/**'
  workflow_dispatch:  # Allow manual trigger for testing

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-east1
  REGISTRY: us-east1-docker.pkg.dev
  REPO: blueforecast
  API_SERVICE: blueforecast-api
  DASHBOARD_SERVICE: blueforecast-dashboard

jobs:
  # -----------------------------------------------------------------
  # Job 1: Build Docker images and push to Artifact Registry
  # -----------------------------------------------------------------
  build-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_JSON }}

      - name: Configure Docker for Artifact Registry
        env:
          PROJECT_ID: ${{ env.PROJECT_ID }}
          REGION: ${{ env.REGION }}
          REGISTRY: ${{ env.REGISTRY }}
          REPO: ${{ env.REPO }}
          API_SERVICE: ${{ env.API_SERVICE }}
          DASHBOARD_SERVICE: ${{ env.DASHBOARD_SERVICE }}
          IMAGE_TAG: ${{ github.sha }}
        run: bash deployment-pipeline/scripts/deploy_dashboard.sh build-push

  # -----------------------------------------------------------------
  # Job 2: Deploy to Cloud Run (runs after images are pushed)
  # -----------------------------------------------------------------
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build-push

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_JSON }}

      - name: Deploy API to Cloud Run
        env:
          PROJECT_ID: ${{ env.PROJECT_ID }}
          REGION: ${{ env.REGION }}
          REGISTRY: ${{ env.REGISTRY }}
          REPO: ${{ env.REPO }}
          API_SERVICE: ${{ env.API_SERVICE }}
          DASHBOARD_SERVICE: ${{ env.DASHBOARD_SERVICE }}
          IMAGE_TAG: ${{ github.sha }}
        run: bash deployment-pipeline/scripts/deploy_dashboard.sh deploy

      - name: Verify deployment
        env:
          API_URL: ${{ env.API_URL }}
          DASHBOARD_URL: ${{ env.DASHBOARD_URL }}
        run: bash deployment-pipeline/scripts/verify_deployment.sh
