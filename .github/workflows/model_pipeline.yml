name: Model Pipeline CI

on:
  push:
    paths:
      - 'Model-Pipeline/**'
      - 'Data-Pipeline/src/data_processing/feature_engineering.py'
  pull_request:
    paths:
      - 'Model-Pipeline/**'
  schedule:
    # Run CI training check every Monday at 03:00 UTC
    - cron: '0 3 * * 1'
  workflow_dispatch:
    inputs:
      run_training:
        description: 'Run model training (requires GCP credentials)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      run_optuna:
        description: 'Run Optuna HPO (only if training enabled)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  # -----------------------------------------------------------------
  # Job 1: Lint + Unit Tests (runs on every push/PR)
  # -----------------------------------------------------------------
  test:
    name: Lint + Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff pytest
          pip install -r Model-Pipeline/requirements.txt
      - name: Lint (ruff)
        run: ruff check Model-Pipeline/src/ Model-Pipeline/dags/
      - name: Unit tests
        run: pytest Model-Pipeline/tests/test_model_pipeline.py -v --tb=short

  # -----------------------------------------------------------------
  # Job 2: Docker Build Verification (main only)
  # -----------------------------------------------------------------
  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Airflow + MLflow images
        working-directory: Model-Pipeline
        run: docker compose -f docker-compose.yaml build --no-cache

  # -----------------------------------------------------------------
  # Job 3: Model Training (manual trigger only, requires GCP creds)
  # Satisfies PDF Section 7.1: "CI/CD should trigger model training"
  # -----------------------------------------------------------------
  train:
    name: Model Training + Validation + Bias Detection
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_training == 'true')
    env:
      PYTHONPATH: Model-Pipeline/src
      MLFLOW_TRACKING_URI: mlruns
      GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GCP_SA_KEY_PATH }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r Model-Pipeline/requirements.txt

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_JSON }}

      - name: Train model (5% sample for CI speed)
        working-directory: Model-Pipeline
        run: |
          echo "=== Training model (5% sample) ==="
          QUICK_CHECK=True RUN_OPTUNA=${{ github.event.inputs.run_optuna }} \
            python train.py

      - name: Evaluate on test set
        working-directory: Model-Pipeline
        run: |
          echo "=== Running evaluation gate ==="
          python evaluate.py

      - name: Run bias detection
        working-directory: Model-Pipeline
        continue-on-error: true  # Bias failure is informational in CI
        run: |
          echo "=== Running bias detection ==="
          python bias_check.py

      - name: Run sensitivity analysis (SHAP only)
        working-directory: Model-Pipeline
        run: |
          echo "=== Running sensitivity analysis ==="
          python sensitivity_run.py

      - name: Training summary
        if: always()
        run: |
          echo "=== CI Training Pipeline Complete ==="
          echo "Model trained on 5% sample for CI verification."
          echo "Full training (100% data) should be run via Airflow DAG."
          echo "Artifacts logged to local MLflow (mlruns/)."

  # -----------------------------------------------------------------
  # Job 4: Notifications (runs after test, always)
  # -----------------------------------------------------------------
  notify:
    name: Pipeline Notifications
    runs-on: ubuntu-latest
    needs: [test]
    if: always()
    steps:
      - name: Notify Slack on failure
        if: needs.test.result == 'failure' && env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":red_circle: *Model Pipeline CI Failed*\n*Branch:* `${{ github.ref_name }}`\n*Commit:* `${{ github.sha }}`\n*Author:* ${{ github.actor }}\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify Slack on success (main only)
        if: needs.test.result == 'success' && github.ref == 'refs/heads/main' && env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":white_check_mark: Model Pipeline CI passed on main — `${{ github.sha }}`"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Create GitHub Issue on failure (fallback)
        if: needs.test.result == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Model Pipeline CI Failed — ${context.sha.substring(0, 7)}`,
              body: `**Branch:** \`${context.ref}\`\n**Author:** ${context.actor}\n**Run:** [View logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ['ci-failure', 'model-pipeline'],
            });