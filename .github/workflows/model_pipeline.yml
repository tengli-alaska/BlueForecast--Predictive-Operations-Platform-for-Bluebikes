name: Model Pipeline CI

on:
  push:
    paths:
      - 'Model-Pipeline/**'
      - 'Data-Pipeline/src/data_processing/feature_engineering.py'
  pull_request:
    paths:
      - 'Model-Pipeline/**'
  workflow_dispatch:

jobs:
  test:
    name: Lint + Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff pytest
          pip install \
            pandas>=2.0.0 numpy>=1.24.0 pyarrow>=12.0.0 \
            xgboost>=2.0.0 scikit-learn>=1.3.0 \
            mlflow>=2.10.0 shap>=0.44.0 holidays>=0.46

      - name: Lint (ruff)
        run: ruff check Model-Pipeline/src/ Model-Pipeline/dags/

      - name: Unit tests
        run: pytest Model-Pipeline/tests/test_model_pipeline.py -v --tb=short

  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    # Only runs on push to main — not on PRs
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Airflow + MLflow images
        working-directory: Model-Pipeline
        run: docker compose build --no-cache
